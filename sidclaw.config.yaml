# SidClaw MCP Guard — Policy Configuration
#
# Rules are evaluated top-to-bottom. First match wins.
# If no rule matches, the default action applies.
#
# Actions:
#   allow   — tool call passes through to upstream
#   deny    — tool call is blocked, agent receives error
#   approve — tool call is held for human approval
#
# Patterns (built-in):
#   sql-read         SELECT, EXPLAIN, SHOW
#   sql-write        INSERT, UPDATE, DELETE
#   sql-destructive  DROP, TRUNCATE, ALTER, CREATE
#   file-read        read_file, list_directory, search_files
#   file-write       write_file, edit_file, move_file
#   file-delete      delete_file, remove_directory

rules:
  # Safe: read queries pass through
  - name: allow-reads
    description: Read-only queries are safe
    match:
      pattern: sql-read
    action: allow

  # Risky: data mutations need a human check
  - name: approve-writes
    description: Data changes need approval
    match:
      pattern: sql-write
    action: approve

  # Dangerous: schema changes are blocked
  - name: deny-destructive
    description: Schema changes are never allowed
    match:
      pattern: sql-destructive
    action: deny
    reason: "Destructive schema operations are blocked by policy"

  # --- Shell command patterns (uncomment to guard shell tools) ---
  #
  # - name: allow-safe-shell
  #   description: Safe read-only shell commands
  #   match:
  #     pattern: shell-safe
  #   action: allow
  #
  # - name: approve-risky-shell
  #   description: Risky shell commands need approval
  #   match:
  #     pattern: shell-risky
  #   action: approve
  #
  # - name: deny-destructive-shell
  #   description: Destructive shell commands are blocked
  #   match:
  #     pattern: shell-destructive
  #   action: deny
  #   reason: "Destructive shell commands are blocked by policy"

# Default: deny anything not explicitly matched
default: deny
